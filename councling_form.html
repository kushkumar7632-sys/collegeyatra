<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Counselling Form</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="college_yatra.css">
</head>
<body>

  <div class="form-container">
    <h2>Counselling Form</h2>

    <form id="counsellingForm" method="post" action="counselling_save.php" enctype="multipart/form-data">

      <label>Student Name</label>
      <input type="text" id="name" placeholder="Enter your name" name="student_name">

      <label>Mother's Name</label>
      <input type="text" id="mother" name="mother_name">

      <label>Father's Name</label>
      <input type="text" id="father" name="father_name">

      <label>Date of Birth</label>
      <input type="date" id="dob" name="dob">

      <label>Address</label>
      <textarea id="address" name="address" rows="3"></textarea>

      <label>Pin Code</label>
      <input type="text" id="pincode" name="pincode" placeholder="6 digit pin code">

      <label>10th Marksheet</label>
      <input type="file" id="marks10" name="marks10" accept=".pdf,.jpg,.png">

      <label>12th Marksheet</label>
      <input type="file" id="marks12" name="marks12" accept=".pdf,.jpg,.png">

      <button type="submit">Submit Form</button>

    </form>
  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
